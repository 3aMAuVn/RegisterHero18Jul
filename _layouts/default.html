<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
  <script>window.__MMM_LANG = {{ page.lang | default: 'en' | jsonify }};</script>
  {% include head.html %}

  <!-- Favicon and PWA metadata are defined once in _includes/head.html. -->
</head>

<body class="{{ page.body_class }}" data-page-lang="{{ page.lang | default: 'en' }}" data-pricing-lang="{{ page.pricing_lang | default: page.lang | default: 'en' }}">
  {% include topbar.html %}
  {{ content }}
  {% include footer.html %}
  {% include scripts.html %}

  <!-- Register service worker -->
  <script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("/service-worker.js")
        .then(function () {
          console.log("Magic Math Master service worker registered");
        })
        .catch(function (error) {
          console.log("Service worker registration failed:", error);
        });
    });
  }
  </script>
</body>
</html>
